services:
  # Qdrant Vector Database (optional - can use in-memory mode)
  qdrant:
    image: qdrant/qdrant:v1.13.3
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - agentic-rag

  # Python API Service
  api:
    build:
      context: .
      dockerfile: agentic_rag/Dockerfile
    container_name: agentic-rag-api
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_LLM_MODEL=${OPENROUTER_LLM_MODEL:-openai/gpt-4-turbo-preview}
      - OPENROUTER_EMBEDDING_MODEL=${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-documents}
      - QDRANT_MODE=${QDRANT_MODE:-remote}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_ITERATIONS=${MAX_ITERATIONS:-10}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - MAX_TOKENS=${MAX_TOKENS:-2048}
      - MEMORY_SIZE=${MEMORY_SIZE:-20}
    networks:
      - agentic-rag
    restart: unless-stopped
    volumes:
      - ./data:/app/data

volumes:
  qdrant_storage:

networks:
  agentic-rag:
    driver: bridge
