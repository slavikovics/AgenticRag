services:
  # Qdrant Vector Database (optional - can use in-memory mode)
  qdrant:
    image: qdrant/qdrant:v1.13.3
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - agentic-rag

  # Python API Service
  api:
    build:
      context: .
      dockerfile: agentic_rag/Dockerfile
    container_name: agentic-rag-api
    ports:
      - "8000:8000"
    environment:
      # OpenRouter API Key - REQUIRED (set this in your .env file)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Optional model configurations with defaults
      - OPENROUTER_LLM_MODEL=${OPENROUTER_LLM_MODEL}
      - OPENROUTER_EMBEDDING_MODEL=${OPENROUTER_EMBEDDING_MODEL}
      # Qdrant configuration
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME}
      - QDRANT_MODE=${QDRANT_MODE}
      # Application settings
      - LOG_LEVEL=${LOG_LEVEL}
      - MAX_ITERATIONS=${MAX_ITERATIONS}
      - TEMPERATURE=${TEMPERATURE}
      - MAX_TOKENS=${MAX_TOKENS}
      - MEMORY_SIZE=${MEMORY_SIZE}
    env_file:
      - .env
    networks:
      - agentic-rag
    restart: unless-stopped
    volumes:
      - ./data:/app/data

volumes:
  qdrant_storage:

networks:
  agentic-rag:
    driver: bridge
