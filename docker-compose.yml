services:
  # Weaviate Vector Database
  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: "weaviate-key-1"
      AUTHENTICATION_APIKEY_USERS: "weaviate-user"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: "text2vec-none"
      LOG_LEVEL: "info"
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - agentic-rag
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Python API Service
  api:
    build:
      context: .
      dockerfile: agentic_rag/Dockerfile
    container_name: agentic-rag-api
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_LLM_MODEL=${OPENROUTER_LLM_MODEL:-openai/gpt-4-turbo-preview}
      - OPENROUTER_EMBEDDING_MODEL=${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_API_KEY=weaviate-key-1
      - WEAVIATE_CLASS_NAME=Document
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_ITERATIONS=${MAX_ITERATIONS:-10}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - MAX_TOKENS=${MAX_TOKENS:-2048}
      - MEMORY_SIZE=${MEMORY_SIZE:-20}
    depends_on:
      weaviate:
        condition: service_healthy
    networks:
      - agentic-rag
    restart: unless-stopped
    volumes:
      - ./data:/app/data

volumes:
  weaviate_data:

networks:
  agentic-rag:
    driver: bridge